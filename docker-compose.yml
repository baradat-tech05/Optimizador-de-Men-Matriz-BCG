services:
  db:
    image: mysql:8.0
    volumes:
      - ./mysql_data:/var/lib/mysql
    environment:
      MYSQL_DATABASE: matriz_bcg
      MYSQL_USER: bcg_user
      MYSQL_PASSWORD: bcg_password
      MYSQL_ROOT_PASSWORD: root_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 5s
      retries: 10

  web:
    build: .
    command: python manage.py runserver 0.0.0.0:8000 --settings=backend.core.settings
    volumes:
      - .:/code
    ports:
      - "8000:8000"
    env_file: 
      - .env
    environment:
      - PYTHONPATH=/code/backend
      - DATABASE_HOST=db
      - DATABASE_NAME=matriz_bcg
      - DATABASE_USER=bcg_user
      - DATABASE_PASSWORD=bcg_password
    depends_on:
      db:
        condition: service_healthy
    restart: on-failure